<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sanctions in Africa</title>

  <link rel="stylesheet" href="style.css" />

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>
</head>

<body>

<h2>Sanctions in Africa</h2>

<svg width="800" height="700"></svg>
<div id="tooltip"></div>

<script>

// ==========================
// ISO mapping
// ==========================
const AFRICAN_ISO = {
  12:"DZA",24:"AGO",204:"BEN",72:"BWA",854:"BFA",108:"BDI",132:"CPV",
  120:"CMR",140:"CAF",148:"TCD",174:"COM",178:"COG",180:"COD",
  384:"CIV",262:"DJI",818:"EGY",226:"GNQ",232:"ERI",748:"SWZ",
  231:"ETH",266:"GAB",270:"GMB",288:"GHA",324:"GIN",624:"GNB",
  404:"KEN",426:"LSO",430:"LBR",434:"LBY",450:"MDG",454:"MWI",
  466:"MLI",478:"MRT",480:"MUS",504:"MAR",508:"MOZ",516:"NAM",
  562:"NER",566:"NGA",646:"RWA",678:"STP",686:"SEN",690:"SYC",
  694:"SLE",706:"SOM",710:"ZAF",728:"SSD",729:"SDN",732:"ESH",
  834:"TZA",768:"TGO",788:"TUN",800:"UGA",894:"ZMB",716:"ZWE"
};

// ==========================
// SANCTIONS DATA
// ==========================
const SANCTIONS = {
  MLI:{name:"Mali",sanctioned:true},
  GIN:{name:"Guinea",sanctioned:true},
  BFA:{name:"Burkina Faso",sanctioned:true},
  NER:{name:"Niger",sanctioned:true},
  SDN:{name:"Sudan",sanctioned:true},
  SSD:{name:"South Sudan",sanctioned:true},
  ERI:{name:"Eritrea",sanctioned:true},
  ZWE:{name:"Zimbabwe",sanctioned:true}
};

// ==========================
function sanctionColor(d){
  if(!d) return "#e5e7eb";
  return d.sanctioned ? "#ef4444" : "#22c55e";
}

const svg = d3.select("svg");
const width = +svg.attr("width");
const height = +svg.attr("height");

const tooltip = d3.select("#tooltip");

// ==========================
// LOAD + DRAW
// ==========================
fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
.then(res => res.json())
.then(world => {

  const countries = topojson.feature(world, world.objects.countries);

  const africa = {
    type: "FeatureCollection",
    features: countries.features.filter(d => AFRICAN_ISO[d.id])
  };

  // 🔥 THIS IS THE KEY FIX
  const projection = d3.geoMercator()
    .fitSize([width, height], africa);

  const path = d3.geoPath().projection(projection);

  svg.selectAll("path")
    .data(africa.features)
    .join("path")
    .attr("d", path)
    .attr("fill", d => {
      const iso = AFRICAN_ISO[d.id];
      return sanctionColor(SANCTIONS[iso]);
    })

    .on("mouseover", (event, d) => {
      const iso = AFRICAN_ISO[d.id];
      const data = SANCTIONS[iso];

      tooltip.style("opacity",1)
        .html(data ? `<strong>${data.name}</strong><br/>Sanctioned` : "No data");
    })

    .on("mousemove", (event) => {
      tooltip
        .style("left",(event.pageX+10)+"px")
        .style("top",(event.pageY+10)+"px");
    })

    .on("mouseout", () => {
      tooltip.style("opacity",0);
    });

});

</script>

</body>
</html>
